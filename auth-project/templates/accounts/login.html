{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="background">

    <div class="blur purple"></div>
    <div class="blur blue"></div>

    <div class="login-card">

        <div class="logo">
            🔒
        </div>

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Login to your account
        </p>

        <form method="POST">

            {% csrf_token %}

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter username"
            >

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="********"
            >

            <div class="remember">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="signup">

            Don't have an account?

            <a href="{% url 'signup_page' %}">
    Sign Up
</a>

        </p>

    </div>

</div>

</body>
</html>
